# Whitelist PRTOE core files + all of CosmicDashboard. Do NOT prefix with "!**/*" — that pattern
# makes the local `cr` CLI fail with "All files are ignored".
#
# Review philosophy: physics-first (PRTOE_PHYSICS_FOR_REVIEW.md + CONTEXT.md).
# CodeRabbit states what math requires; implementers choose the code.
# Local `cr` CLI does NOT print summaries — use scripts/cr-prtoe.sh for banner.
#
# GitHub workflows:
#   @coderabbitai full review
#   @coderabbitai configuration
# Learn examples (post on PR):
#   @coderabbitai Learn: PRTOE reviews are physics-first. Cite CONTEXT.md or
#     PRTOE_PHYSICS_FOR_REVIEW.md § for every Major finding. State the invariant
#     in math language; list affected code sites and gates. No diffs unless asked.
#   @coderabbitai Learn: When trans/F_dot/de_mode changes, trace all readers in
#     background.c, background.h, perturbations.c, perturbations.h in one review.
#   @coderabbitai Learn: Every Newtonian metric term needs a synchronous gauge
#     equivalent; report both or flag as incomplete.

language: en-US

tone_instructions: >-
  Physics-first: cite CONTEXT.md or PRTOE_PHYSICS_FOR_REVIEW §. State invariant violated; list code sites + impact only. No diffs/patches unless asked. Exhaustive contract sweep.

reviews:
  profile: assertive

  review_status: true
  enable_prompt_for_ai_agents: false
  high_level_summary_in_walkthrough: true

  high_level_summary_instructions: >-
    Line 1: ✓ PRTOE+CosmicDashboard .coderabbit.yaml ACTIVE — physics-first | CONTEXT.md +
    PRTOE_PHYSICS_FOR_REVIEW.md | no auto-patches
    If absent: CONFIG NOT LOADED. Then summarize changes in plain language.

  path_filters:
    - "source/perturbations.c"
    - "source/background.c"
    - "include/perturbations.h"
    - "include/background.h"
    # CosmicDashboard (full app: UI, backend, utils, assets, scripts)
    - "cosmic_dashboard/**"
    - "cosmic_explorer.py"
    - "run_cosmicforge.py"
    - "launch_cosmic.sh"
    - "kill_dashboard.ps1"

  poem: false
  review_details: true
  collapse_walkthrough: false
  changed_files_summary: true

  auto_review:
    auto_incremental_review: false

  tools:
    clang:
      enabled: true
    cppcheck:
      enabled: true

  pre_merge_checks:
    custom_checks:
      - mode: warning
        name: PRTOE yaml config handshake
        instructions: |
          FIRST line of the review (walkthrough or summary, before findings):
          ✓ PRTOE+CosmicDashboard .coderabbit.yaml ACTIVE — physics-first | CONTEXT.md |
          PRTOE_PHYSICS_FOR_REVIEW.md | impact trace ON | no auto-patches
          If this instruction block is not in your context, print instead:
          CONFIG NOT LOADED — .coderabbit.yaml not applied.
          Mark PASS only if the correct banner line appears first.

      - mode: warning
        name: PRTOE CONTEXT contract sweep
        instructions: |
          Before completing the review, verify every item in CONTEXT.md
          "Background contracts" and "Perturbation contracts" against the
          whitelisted files (PRTOE core + cosmic_dashboard integration points).
          List each contract as PASS or FAIL with physics
          citation (CONTEXT or PRTOE_PHYSICS_FOR_REVIEW §). FAIL → Major.
          Do not mark review complete with unchecked contracts.

      - mode: warning
        name: PRTOE physics impact trace
        instructions: |
          For every Major finding, list (1) the math invariant violated;
          (2) symbols/indices involved; (3) every read/write site in
          background.c, background.h, perturbations.c, perturbations.h (and
          cosmic_dashboard code that reads/writes PRTOE state) that must stay
          consistent. Do NOT propose code patches or diffs.
          Flag IC vs evolution, sync vs Newtonian, storage vs solver mismatches.

  path_instructions:
    - path: "**/*"
      instructions: |
        PRTOE PHYSICS-FIRST REVIEW (no implementation prescriptions)

        Authority (in order):
        1. PRTOE_PHYSICS_FOR_REVIEW.md — compact math for audits
        2. CONTEXT.md — auditable PASS/FAIL contracts
        3. PRTOE_Working_Formulation.md — derivation disputes only

        REQUIRED FINDING FORMAT (every Major/Minor):
          Physics: [invariant/equation violated + doc § citation]
          Code:    [file:line where implementation diverges]
          Impact:  [symbols, gates, paired sites — no patches]
        Do NOT include unified diffs, "Proposed fix", or "Prompt for AI agent"
        blocks unless the user explicitly requests implementation help.

        Sweep all whitelisted files (PRTOE core + full cosmic_dashboard). Do not stop at first findings.
        Continue until cross-file contracts are checked.

        Mandatory consistency pairs:
        - background_functions ↔ background_derivs (F_dot, trans, de_mode)
        - IC seeding ↔ later evolution (δφ, η, rho_plus_p_shear, δF shear)
        - Newtonian metric ↔ synchronous gauge (sources, alpha transforms)
        - activation predicates (single threshold family everywhere)

        Secondary verification (before finalizing):
        1. Activation predicates consistent
        2. F_dot / trans / de_mode aligned in functions + derivs + storage
        3. rho_r budget complete (incl. NCDM 3p)
        4. p_tot_prime includes PRTOE when active
        5. IC shear budget complete before constraint solve
        6. Source guards at PRTOE_RHO_ACTIVATION_THRESHOLD
        7. Null-limit and unified-dark-sector edge cases

        Format severities: Major | Minor | Nit. If truncated, continue in follow-up.

    - path: "**/perturbations.c"
      instructions: |
        Physics audit: ICs (§3), slip/shear (§2), gauge pairs (§2), sources (§7).
        Report invariant violations and line locations; no code suggestions.

    - path: "**/background.c"
      instructions: |
        Physics audit: Friedmann (§1), activation (§1), Lambda routing (§1).
        Trace stored index_bg_* to perturbation consumers; no code suggestions.

    - path: "**/perturbations.h"
      instructions: |
        API/gate consistency vs perturbations.c and CONTEXT.md. Physics citations only.

    - path: "**/background.h"
      instructions: |
        Inline helpers and indices vs background.c. Physics citations only.

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - path: "PRTOE_PHYSICS_FOR_REVIEW.md"
        instructions: |
          Primary math/physics reference for reviews. Cite section numbers.
          State invariants violated; never prescribe C implementation.
      - path: "CONTEXT.md"
        instructions: |
          Auditable contract checklist. Every Major finding must name the
          contract violated. PASS/FAIL sweep before review completes.
      - path: "PRTOE_Working_Formulation.md"
        instructions: |
          Use only for derivation-level disputes when compact doc is insufficient.
          Prefer PRTOE_PHYSICS_FOR_REVIEW.md for routine audits.